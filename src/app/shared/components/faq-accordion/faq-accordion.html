<div class="space-y-3">
  @for (faq of faqs; track faq.pregunta; let i = $index) {
    <div class="border border-gray-200 rounded-lg overflow-hidden">
      <button
        type="button"
        class="w-full flex items-start justify-between gap-4 px-5 py-4 text-left transition-colors duration-150"
        [style.background-color]="isOpen(i) ? '#EBF5FB' : 'white'"
        (click)="toggle(i)"
        [attr.aria-expanded]="isOpen(i)"
        [attr.id]="'faq-btn-' + i"
        [attr.aria-controls]="'faq-panel-' + i"
      >
        <span class="font-semibold text-sm sm:text-base leading-snug" style="color: #1A5276;">
          {{ faq.pregunta }}
        </span>
        <svg
          class="w-5 h-5 shrink-0 mt-0.5 transition-transform duration-200"
          [class.rotate-180]="isOpen(i)"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          style="color: #2E86C1;"
          aria-hidden="true"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <div
        [id]="'faq-panel-' + i"
        [attr.aria-labelledby]="'faq-btn-' + i"
        role="region"
        [class.hidden]="!isOpen(i)"
        class="px-5 pb-5"
      >
        <hr class="border-gray-100 mb-4">
        <p class="text-sm leading-relaxed" style="color: #1C2833;">
          {{ faq.respuesta }}
        </p>
      </div>
    </div>
  }
</div>
