<app-breadcrumb [items]="breadcrumbs" />

<!-- HERO -->
<section class="relative overflow-hidden py-14 sm:py-16" style="background: linear-gradient(135deg, #001a4d 0%, #002b7b 50%, #023660 100%);">
  <div class="absolute inset-0 pointer-events-none" aria-hidden="true"
    style="opacity:0.04; background-image: linear-gradient(#ffffff 1px, transparent 1px), linear-gradient(90deg, #ffffff 1px, transparent 1px); background-size: 60px 60px;"></div>
  <div class="absolute top-0 right-0 w-72 h-72 rounded-full pointer-events-none" style="background:rgba(4,95,195,0.3); filter:blur(100px);"></div>
  <div class="absolute top-0 left-0 right-0 h-1" style="background: linear-gradient(to right, #002b7b, #045fc3, #002b7b);"></div>
  <div class="relative max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <span class="text-xs font-semibold px-3 py-1 rounded-full" style="background:rgba(255,255,255,0.15); color:#baf1ff;">Guía Legal</span>
    <h1 class="text-2xl sm:text-3xl font-bold text-white leading-tight mt-4">{{ titulo }}</h1>
  </div>
</section>

<article style="background:#ffffff;">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

    <app-author-box
      nombre="Bruno Capeletti"
      slug="bruno-capeletti"
      titulo="Abogado especialista en accidentes laborales"
      matricula="C.S.J.S.F. T° XVI F° 48"
      fechaActualizacion="2026-04-01"
    />

    <div class="mt-10">
      <p class="leading-relaxed text-base" style="color:rgba(11,24,58,0.7);">Esta guía está siendo preparada por nuestro equipo de especialistas. Mientras tanto, podés consultar tu caso directamente con nosotros.</p>
    </div>

    <div class="mt-12 p-6 rounded-2xl" style="background:linear-gradient(135deg, #002b7b, #045fc3);">
      <p class="font-bold text-white mb-2">¿Tenés dudas sobre tu caso?</p>
      <p class="text-sm mb-5" style="color:rgba(255,255,255,0.75);">Consulta gratis con nuestros especialistas. Respondemos en 24 horas.</p>
      <a routerLink="/contactanos"
        class="inline-flex items-center justify-center px-8 py-3 rounded-xl font-bold text-sm transition-all"
        style="background:#fff; color:#002b7b;">Consultar gratis</a>
    </div>
  </div>
</article>
