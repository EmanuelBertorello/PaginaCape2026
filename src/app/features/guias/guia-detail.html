<app-breadcrumb [items]="breadcrumbs" />

<article class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <header class="mb-8">
    <span class="badge badge-primary mb-3">Guía Legal</span>
    <h1 class="text-3xl sm:text-4xl font-bold leading-tight" style="color: #1A5276;">{{ titulo }}</h1>
  </header>

  <app-author-box
    nombre="Bruno "
    slug="bruno"
    titulo="Abogado especialista en accidentes laborales"
    matricula="C.S.J.S.F. T° XVI F° 48"
    fechaActualizacion="2026-04-01"
  />

  <div class="mt-10" style="color: #5D6D7E;">
    <p class="leading-relaxed">Esta guía está siendo preparada por nuestro equipo de especialistas. Mientras tanto, podés consultar tu caso directamente con nosotros.</p>
  </div>

  <div class="mt-12 p-6 rounded-lg text-center" style="background-color: #D6EAF8;">
    <p class="font-semibold mb-3" style="color: #1A5276;">¿Tenés dudas sobre tu caso?</p>
    <a routerLink="/contactanos" class="btn-primary">Consultar gratis</a>
  </div>
</article>
