<app-breadcrumb [items]="breadcrumbs" />

<!-- HERO -->
<section class="relative overflow-hidden py-16 sm:py-20" style="background: linear-gradient(135deg, #001a4d 0%, #002b7b 50%, #023660 100%);">
  <div class="absolute inset-0 pointer-events-none" aria-hidden="true"
    style="opacity:0.04; background-image: linear-gradient(#ffffff 1px, transparent 1px), linear-gradient(90deg, #ffffff 1px, transparent 1px); background-size: 60px 60px;"></div>
  <div class="absolute top-0 right-0 w-96 h-96 rounded-full pointer-events-none" style="background:rgba(4,95,195,0.3); filter:blur(120px);"></div>
  <div class="absolute top-0 left-0 right-0 h-1" style="background: linear-gradient(to right, #002b7b, #045fc3, #002b7b);"></div>
  <div class="relative max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-semibold mb-6 uppercase tracking-wider"
      style="background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2);">
      <span style="width:6px;height:6px;border-radius:50%;background:#baf1ff;display:inline-block;flex-shrink:0;"></span>
      Guías Legales
    </div>
    <h1 class="text-3xl sm:text-4xl font-bold text-white leading-tight">Guías Legales Gratuitas</h1>
    <p class="mt-4 text-lg max-w-2xl mx-auto" style="color:rgba(255,255,255,0.75);">
      Guías completas sobre tus derechos laborales, escritas por abogados especializados.
    </p>
  </div>
</section>

<!-- GUIAS -->
<section style="background:#ffffff;" class="py-16">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="space-y-4">
      @for (guia of guias; track guia.slug) {
        <a
          [routerLink]="'/guias/' + guia.slug"
          class="group flex items-start gap-5 p-6 bg-white rounded-2xl transition-all hover:shadow-xl"
          style="border:1px solid rgba(0,43,123,0.1); box-shadow:0 2px 12px rgba(0,43,123,0.05);"
        >
          <div class="w-12 h-12 rounded-xl flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, #002b7b, #045fc3);">
            <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
          </div>
          <div class="flex-1">
            <h2 class="font-bold text-lg group-hover:text-[#045fc3] transition-colors" style="color:#0b183a;">{{ guia.titulo }}</h2>
            <p class="text-sm mt-2 leading-relaxed" style="color:rgba(11,24,58,0.6);">{{ guia.descripcion }}</p>
            <div class="flex items-center gap-4 mt-3">
              <p class="text-xs" style="color:rgba(11,24,58,0.4);">{{ guia.tiempoLectura }} min lectura</p>
              <p class="text-xs font-semibold" style="color:#045fc3;">Leer guía →</p>
            </div>
          </div>
        </a>
      }
    </div>
  </div>
</section>
