<app-breadcrumb [items]="breadcrumbs" />

<section style="background-color: #1A5276;" class="py-14">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h1 class="text-3xl sm:text-4xl font-bold text-white">Guías Legales Gratuitas</h1>
    <p class="mt-4 text-lg max-w-2xl mx-auto" style="color: #D6EAF8;">
      Guías completas sobre tus derechos laborales, escritas por abogados especializados.
    </p>
  </div>
</section>

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
  <div class="space-y-5">
    @for (guia of guias; track guia.slug) {
      <a
        [routerLink]="'/guias/' + guia.slug"
        class="card p-6 group hover:border-blue-200 border border-gray-100 transition-all duration-150 flex items-start gap-5"
      >
        <div class="w-12 h-12 rounded-lg flex items-center justify-center shrink-0" style="background-color: #D6EAF8;">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: #1A5276;" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
        </div>
        <div class="flex-1">
          <h2 class="font-semibold text-lg group-hover:underline" style="color: #1A5276;">{{ guia.titulo }}</h2>
          <p class="text-sm mt-2 leading-relaxed" style="color: #5D6D7E;">{{ guia.descripcion }}</p>
          <p class="text-xs mt-3" style="color: #5D6D7E;">{{ guia.tiempoLectura }} min lectura</p>
        </div>
      </a>
    }
  </div>
</div>
